<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>住所マッパー｜チラシ配りルート整理</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
 
  body {
    font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
    background: #f0f4f8;
    color: #1a1a2e;
    min-height: 100vh;
  }
 
  header {
    background: #1a1a2e;
    color: #fff;
    padding: 20px 32px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  header h1 { font-size: 20px; font-weight: 600; letter-spacing: 0.02em; }
  header span { font-size: 13px; color: #8899bb; margin-top: 2px; display: block; }
 
  .icon-map {
    width: 36px; height: 36px;
    background: #3a7bd5;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .icon-map svg { width: 20px; height: 20px; fill: #fff; }
 
  main { max-width: 860px; margin: 0 auto; padding: 32px 20px; }
 
  .drop-zone {
    border: 2px dashed #b0c0d8;
    border-radius: 14px;
    background: #fff;
    text-align: center;
    padding: 52px 20px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }
  .drop-zone:hover, .drop-zone.drag-over {
    border-color: #3a7bd5;
    background: #f0f5ff;
  }
  .drop-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .drop-zone .dz-icon { font-size: 40px; margin-bottom: 12px; }
  .drop-zone .dz-title { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
  .drop-zone .dz-sub { font-size: 13px; color: #667; }
 
  #status {
    margin-top: 18px;
    padding: 12px 18px;
    border-radius: 10px;
    font-size: 14px;
    display: none;
    align-items: center;
    gap: 10px;
  }
  #status.loading { display: flex; background: #e8f0fe; color: #1a5fc8; }
  #status.done    { display: flex; background: #e6f9f0; color: #1a7a4a; }
  #status.error   { display: flex; background: #fdecea; color: #c0392b; }
  .spinner {
    width: 18px; height: 18px; border: 2px solid currentColor;
    border-top-color: transparent; border-radius: 50%;
    animation: spin 0.8s linear infinite; flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
 
  #results { margin-top: 28px; }
 
  .result-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .result-header h2 { font-size: 17px; font-weight: 600; }
  .badge {
    background: #3a7bd5;
    color: #fff;
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 20px;
  }
 
  #open-all-btn {
    display: none;
    width: 100%;
    margin-bottom: 20px;
    padding: 14px;
    background: #3a7bd5;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    letter-spacing: 0.02em;
  }
  #open-all-btn:hover { background: #2a5fb5; }
 
  .town-card {
    background: #fff;
    border-radius: 12px;
    margin-bottom: 16px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
  }
  .town-card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 18px;
    background: #f7f9ff;
    border-bottom: 1px solid #e8edf5;
    cursor: pointer;
    user-select: none;
  }
  .town-card-header:hover { background: #edf1fa; }
  .town-name {
    font-size: 15px;
    font-weight: 600;
    color: #1a3a6e;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .town-count {
    font-size: 12px;
    background: #dde8f8;
    color: #2a5bc8;
    padding: 2px 9px;
    border-radius: 12px;
    font-weight: 500;
  }
  .card-actions { display: flex; gap: 8px; align-items: center; }
 
  .btn-maps {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: #4285f4;
    color: #fff;
    border: none;
    border-radius: 7px;
    padding: 6px 13px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .btn-maps:hover { background: #2a6de0; }
  .btn-maps svg { width: 13px; height: 13px; fill: #fff; }
 
  .chevron {
    transition: transform 0.2s;
    color: #667;
    font-size: 16px;
  }
  .chevron.open { transform: rotate(180deg); }
 
  .addr-list {
    padding: 6px 0;
    display: none;
  }
  .addr-list.open { display: block; }
 
  .addr-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 18px;
    font-size: 13px;
    border-bottom: 1px solid #f0f3f8;
    gap: 10px;
  }
  .addr-item:last-child { border-bottom: none; }
  .addr-text { color: #334; flex: 1; }
 
  .btn-single {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: #f0f5ff;
    color: #2a5bc8;
    border: 1px solid #c5d8f8;
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .btn-single:hover { background: #dce8fd; }
 
  .no-result {
    text-align: center;
    color: #889;
    padding: 40px 20px;
    font-size: 14px;
  }
 
  .footer-note {
    margin-top: 28px;
    padding: 14px 18px;
    background: #fff8e8;
    border-left: 4px solid #f0b429;
    border-radius: 0 8px 8px 0;
    font-size: 12px;
    color: #7a5800;
    line-height: 1.7;
  }
</style>
</head>
<body>
 
<header>
  <div class="icon-map">
    <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
  </div>
  <div>
    <h1>住所マッパー</h1>
    <span>PDFから住所を読み取り、町名でグループ化してGoogle Mapsへ送ります</span>
  </div>
</header>
 
<main>
  <div class="drop-zone" id="drop-zone">
    <input type="file" accept=".pdf" id="file-input">
    <div class="dz-icon">📄</div>
    <div class="dz-title">PDFファイルをここにドロップ</div>
    <div class="dz-sub">またはクリックしてファイルを選択</div>
  </div>
 
  <div id="status"></div>
  <div id="results"></div>
</main>
 
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
 
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const statusEl = document.getElementById('status');
const resultsEl = document.getElementById('results');
 
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type === 'application/pdf') processFile(file);
  else showStatus('error', 'PDFファイルを選択してください。');
});
fileInput.addEventListener('change', e => {
  if (e.target.files[0]) processFile(e.target.files[0]);
});
 
function showStatus(type, msg) {
  statusEl.className = type;
  statusEl.innerHTML = (type === 'loading')
    ? `<div class="spinner"></div><span>${msg}</span>`
    : `<span>${type === 'done' ? '✅' : '❌'}</span><span>${msg}</span>`;
}
 
async function processFile(file) {
  resultsEl.innerHTML = '';
  showStatus('loading', 'PDFを読み込んでいます...');
 
  try {
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    let fullText = '';
 
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      fullText += content.items.map(item => item.str).join(' ') + '\n';
    }
 
    const addresses = extractAddresses(fullText);
    if (addresses.length === 0) {
      showStatus('error', '住所が見つかりませんでした。PDFにテキストが含まれているか確認してください。');
      return;
    }
 
    const grouped = groupByTown(addresses);
    showStatus('done', `${addresses.length}件の住所を ${Object.keys(grouped).length}つの町名グループに分けました。`);
    renderResults(grouped);
  } catch (err) {
    showStatus('error', 'PDFの読み込みに失敗しました: ' + err.message);
  }
}

// ============================================================
// 住所抽出：都道府県を起点に抽出し、郵便番号を完全排除
// ============================================================
const PREF_LIST = '東京都|大阪府|京都府|北海道|神奈川県|愛知県|埼玉県|千葉県|兵庫県|福岡県|静岡県|茨城県|広島県|宮城県|新潟県|長野県|岐阜県|栃木県|群馬県|岡山県|福島県|三重県|熊本県|鹿児島県|沖縄県|滋賀県|山口県|愛媛県|奈良県|長崎県|青森県|岩手県|大分県|石川県|山形県|宮崎県|富山県|秋田県|香川県|和歌山県|佐賀県|山梨県|福井県|徳島県|高知県|島根県|鳥取県';

function extractAddresses(text) {
  // ① 記号・余分な空白を詰める
  let t = text.replace(/[\uF0B7\u2022・●]+/g, '').replace(/\s+/g, '');

  // ② 郵便番号を「〒あり・なし・全角数字」全パターンで削除
  //    〒?  数字3桁  区切り  数字4桁
  t = t.replace(/〒?[0-9０-９]{3}[－\-ー―][0-9０-９]{4}/g, '');

  // ③ 都道府県から番地末尾まで抽出
  //    区切り文字：丁目番地棟 + 全角半角ハイフン類（\u002D = 半角ハイフン、文字クラス末尾で範囲誤認を防ぐ）
  //    末尾：「号」単独 / 「号101室」/ 「室」に対応
  const regex = new RegExp(
    `(${PREF_LIST})` +
    `[^0-9０-９]+?` +                                           // 市区町村（漢字部分）
    `[0-9０-９]+` +                                              // 最初の数字
    `(?:[丁目番地棟－ー―\u002D]+[0-9０-９]+)*` +                // 丁目/番/地/ハイフン区切り＋数字の繰り返し
    `(?:号(?:[0-9０-９]+室?)?|室)?`,                             // 末尾：号 / 号101室 / 室（任意）
    'g'
  );

  const raw = t.match(regex) || [];

  // ④ 念のため：都道府県より前に数字が紛れ込んでいたら切り落とす
  const prefReg = new RegExp(`(${PREF_LIST})`);
  const result = raw.map(addr => {
    const m = addr.match(prefReg);
    return m ? addr.slice(addr.indexOf(m[0])) : addr;
  });

  return [...new Set(result)].filter(a => a.length > 5);
}

// ============================================================
// Google Maps URL：郵便番号なしの住所文字列をそのまま送る
// ============================================================
function mapsUrl(addresses) {
  // 住所から郵便番号を念のため再除去してクリーンな文字列にする
  const clean = addresses.map(cleanAddr);

  if (clean.length === 1) {
    return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(clean[0])}`;
  }

  const targets = clean.slice(0, 10);
  const origin      = encodeURIComponent(targets[0]);
  const destination = encodeURIComponent(targets[targets.length - 1]);

  if (targets.length === 2) {
    return `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${destination}`;
  }

  const waypoints = targets.slice(1, -1).map(a => encodeURIComponent(a)).join('%7C');
  return `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${destination}&waypoints=${waypoints}`;
}

// 郵便番号・記号を除去して住所文字列を返す（Maps送信前の最終クリーン）
function cleanAddr(addr) {
  return addr
    .replace(/〒?[0-9０-９]{3}[－\-ー―][0-9０-９]{4}/g, '') // 郵便番号
    .replace(/[\s　]+/g, '')                                   // 全角半角スペース
    .trim();
}

// ============================================================
// 町名抽出（グループ化キー）
// ============================================================
function extractTown(address) {
  const body = address.replace(new RegExp(`^(${PREF_LIST})`), '');
  const nameOnly = body.replace(/[0-9０-９].*$/, '').trim();
 
  let m = nameOnly.match(/^(.+?市.+?区)(.+)$/);
  if (m) return m[1] + (m[2] || '');
 
  m = nameOnly.match(/^(.+?市)(.+)$/);
  if (m) {
    const rest = m[2];
    const ku = rest.match(/^(.+?[区町村])/);
    if (ku) return m[1] + ku[1];
    return m[1] + rest;
  }
 
  m = nameOnly.match(/^(.+?区)(.+)$/);
  if (m) return m[1] + (m[2] || '');
 
  return nameOnly.slice(0, 15);
}
 
function groupByTown(addresses) {
  const groups = {};
  for (const addr of addresses) {
    const town = extractTown(addr);
    if (!groups[town]) groups[town] = [];
    groups[town].push(addr);
  }
  return Object.fromEntries(
    Object.entries(groups).sort((a, b) => b[1].length - a[1].length)
  );
}
 
// ============================================================
// 描画
// ============================================================
function renderResults(grouped) {
  const townKeys = Object.keys(grouped);
  const totalAddrs = Object.values(grouped).reduce((s, a) => s + a.length, 0);
 
  let html = `
    <div class="result-header">
      <h2>町名グループ一覧</h2>
      <span class="badge">${totalAddrs}件 / ${townKeys.length}グループ</span>
    </div>
    <button id="open-all-btn" onclick="openAllMaps()">📍 すべてのグループをGoogle Mapsで開く</button>
  `;
 
  for (const [town, addrs] of Object.entries(grouped)) {
    const mapUrl = mapsUrl(addrs);
    html += `
      <div class="town-card">
        <div class="town-card-header" onclick="toggleCard(this)">
          <div class="town-name">
            📍 ${escHtml(town)}
            <span class="town-count">${addrs.length}件</span>
          </div>
          <div class="card-actions">
            <a class="btn-maps" href="${mapUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
              <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
              経路を開く
            </a>
            <span class="chevron">▼</span>
          </div>
        </div>
        <div class="addr-list">
          ${addrs.map(a => {
            const ca = cleanAddr(a);
            return `
            <div class="addr-item">
              <span class="addr-text">${escHtml(ca)}</span>
              <a class="btn-single"
                href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(ca)}"
                target="_blank" rel="noopener">
                📌 この住所
              </a>
            </div>`;
          }).join('')}
        </div>
      </div>
    `;
  }
 
  html += `
    <div class="footer-note">
      ⚠️ Google Mapsの経路案内は、仕様上「最大10件」までしか同時に線を繋げません。<br>
      1グループに11件以上住所がある場合は、最初の10件のみでルートが作成されます。
    </div>
  `;
 
  resultsEl.innerHTML = html;
  document.getElementById('open-all-btn').style.display = 'block';
 
  const firstHeader = resultsEl.querySelector('.town-card-header');
  if (firstHeader) toggleCard(firstHeader);
}
 
function toggleCard(header) {
  const list = header.nextElementSibling;
  const chevron = header.querySelector('.chevron');
  list.classList.toggle('open');
  chevron.classList.toggle('open');
}
 
function openAllMaps() {
  const links = document.querySelectorAll('.btn-maps');
  links.forEach((link, i) => {
    setTimeout(() => window.open(link.href, '_blank'), i * 400);
  });
}
 
function escHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
</script>
</body>
</html>
