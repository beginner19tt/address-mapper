<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>住所マッパー｜チラシ配りルート整理</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Hiragino Sans', 'Meiryo', sans-serif; background: #f0f4f8; color: #1a1a2e; min-height: 100vh; }

  header { background: #1a1a2e; color: #fff; padding: 20px 32px; display: flex; align-items: center; gap: 14px; }
  header h1 { font-size: 20px; font-weight: 600; letter-spacing: 0.02em; }
  header span { font-size: 13px; color: #8899bb; margin-top: 2px; display: block; }
  .icon-map { width: 36px; height: 36px; background: #3a7bd5; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .icon-map svg { width: 20px; height: 20px; fill: #fff; }

  main { max-width: 860px; margin: 0 auto; padding: 32px 20px; }

  .drop-zone { border: 2px dashed #b0c0d8; border-radius: 14px; background: #fff; text-align: center; padding: 52px 20px; cursor: pointer; transition: border-color .2s, background .2s; position: relative; }
  .drop-zone:hover, .drop-zone.drag-over { border-color: #3a7bd5; background: #f0f5ff; }
  .drop-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .drop-zone .dz-icon { font-size: 40px; margin-bottom: 12px; }
  .drop-zone .dz-title { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
  .drop-zone .dz-sub { font-size: 13px; color: #667; }

  #status { margin-top: 18px; padding: 12px 18px; border-radius: 10px; font-size: 14px; display: none; align-items: center; gap: 10px; }
  #status.loading { display: flex; background: #e8f0fe; color: #1a5fc8; }
  #status.done    { display: flex; background: #e6f9f0; color: #1a7a4a; }
  #status.error   { display: flex; background: #fdecea; color: #c0392b; }
  .spinner { width: 18px; height: 18px; border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin .8s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }

  #results { margin-top: 28px; }
  .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .result-header h2 { font-size: 17px; font-weight: 600; }
  .badge { background: #3a7bd5; color: #fff; font-size: 12px; padding: 3px 10px; border-radius: 20px; }

  #open-all-btn { display: none; width: 100%; margin-bottom: 20px; padding: 14px; background: #3a7bd5; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background .2s; letter-spacing: .02em; }
  #open-all-btn:hover { background: #2a5fb5; }

  .town-card { background: #fff; border-radius: 12px; margin-bottom: 16px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
  .town-card-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 18px; background: #f7f9ff; border-bottom: 1px solid #e8edf5; cursor: pointer; user-select: none; }
  .town-card-header:hover { background: #edf1fa; }
  .town-name { font-size: 15px; font-weight: 600; color: #1a3a6e; display: flex; align-items: center; gap: 8px; }
  .town-count { font-size: 12px; background: #dde8f8; color: #2a5bc8; padding: 2px 9px; border-radius: 12px; font-weight: 500; }
  .card-actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }

  /* アプリボタン */
  .btn-app { display: inline-flex; align-items: center; gap: 4px; border: none; border-radius: 7px; padding: 6px 11px; font-size: 11px; font-weight: 700; cursor: pointer; text-decoration: none; transition: opacity .15s; white-space: nowrap; }
  .btn-app:hover { opacity: .85; }
  .btn-google { background: #4285f4; color: #fff; }
  .btn-yahoo  { background: #ff0033; color: #fff; }
  .btn-apple  { background: #1a1a2e; color: #fff; }

  .chevron { transition: transform .2s; color: #667; font-size: 16px; }
  .chevron.open { transform: rotate(180deg); }

  .addr-list { padding: 6px 0; display: none; }
  .addr-list.open { display: block; }

  .addr-item { display: flex; align-items: center; justify-content: space-between; padding: 9px 18px; font-size: 13px; border-bottom: 1px solid #f0f3f8; gap: 8px; }
  .addr-item:last-child { border-bottom: none; }
  .addr-text { color: #334; flex: 1; font-size: 12px; }
  .addr-btns { display: flex; gap: 4px; flex-shrink: 0; }

  .btn-single { display: inline-flex; align-items: center; border: none; border-radius: 5px; padding: 3px 7px; font-size: 10px; font-weight: 700; cursor: pointer; text-decoration: none; transition: opacity .15s; white-space: nowrap; }
  .btn-single:hover { opacity: .8; }
  .bs-google { background: #4285f4; color: #fff; }
  .bs-yahoo  { background: #ff0033; color: #fff; }
  .bs-apple  { background: #1a1a2e; color: #fff; }

  .footer-note { margin-top: 28px; padding: 14px 18px; background: #fff8e8; border-left: 4px solid #f0b429; border-radius: 0 8px 8px 0; font-size: 12px; color: #7a5800; line-height: 1.7; }
</style>
</head>
<body>

<header>
  <div class="icon-map">
    <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
  </div>
  <div>
    <h1>住所マッパー</h1>
    <span>PDFから住所を読み取り、町名でグループ化・丁目順に並べてナビアプリへ送ります</span>
  </div>
</header>

<main>
  <div class="drop-zone" id="drop-zone">
    <input type="file" accept=".pdf" id="file-input">
    <div class="dz-icon">📄</div>
    <div class="dz-title">PDFファイルをここにドロップ</div>
    <div class="dz-sub">またはクリックしてファイルを選択</div>
  </div>
  <div id="status"></div>
  <div id="results"></div>
</main>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const dropZone  = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const statusEl  = document.getElementById('status');
const resultsEl = document.getElementById('results');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f && f.type === 'application/pdf') processFile(f);
  else showStatus('error', 'PDFファイルを選択してください。');
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) processFile(e.target.files[0]); });

function showStatus(type, msg) {
  statusEl.className = type;
  statusEl.innerHTML = type === 'loading'
    ? `<div class="spinner"></div><span>${msg}</span>`
    : `<span>${type === 'done' ? '✅' : '❌'}</span><span>${msg}</span>`;
}

async function processFile(file) {
  resultsEl.innerHTML = '';
  showStatus('loading', 'PDFを読み込んでいます...');
  try {
    const buf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
    let fullText = '';
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      fullText += content.items.map(it => it.str).join(' ') + '\n';
    }
    const addresses = extractAddresses(fullText);
    if (!addresses.length) {
      showStatus('error', '住所が見つかりませんでした。PDFにテキストが含まれているか確認してください。');
      return;
    }
    const grouped = groupByTown(addresses);
    showStatus('done', `${addresses.length}件の住所を ${Object.keys(grouped).length}つの町名グループに分けました。`);
    renderResults(grouped);
  } catch (err) {
    showStatus('error', 'PDFの読み込みに失敗しました: ' + err.message);
  }
}

// ============================================================
// 定数
// ============================================================
const PREF_STR = '東京都|大阪府|京都府|北海道|神奈川県|愛知県|埼玉県|千葉県|兵庫県|福岡県|静岡県|茨城県|広島県|宮城県|新潟県|長野県|岐阜県|栃木県|群馬県|岡山県|福島県|三重県|熊本県|鹿児島県|沖縄県|滋賀県|山口県|愛媛県|奈良県|長崎県|青森県|岩手県|大分県|石川県|山形県|宮崎県|富山県|秋田県|香川県|和歌山県|佐賀県|山梨県|福井県|徳島県|高知県|島根県|鳥取県';
const ADDR_CLS = '[\u002D0-9０-９丁目番地号棟室階Ff－ー―]';

// ============================================================
// 住所抽出
// ============================================================
function extractAddresses(rawText) {
  let t = rawText.replace(/[\uF0B7\u2022・●]+/g, '').replace(/\s+/g, '');
  t = t.replace(/〒?[0-9０-９]{3}[\u002D－ー―][0-9０-９]{4}/g, '');

  const prefReg = new RegExp('(?:' + PREF_STR + ')', 'g');
  const positions = [];
  let m;
  while ((m = prefReg.exec(t)) !== null) positions.push(m.index);

  const addrReg = new RegExp(
    '^(?:' + PREF_STR + ')' +
    '[^0-9０-９]+?' +
    ADDR_CLS + '+'
  );

  const results = [];
  for (let i = 0; i < positions.length; i++) {
    const chunk = t.slice(positions[i], positions[i + 1] ?? t.length);
    const hit = chunk.match(addrReg);
    if (hit) {
      const addr = hit[0].replace(/[丁目番地棟室階]+$/, '');
      if (addr.length > 5) results.push(addr);
    }
  }
  return [...new Set(results)];
}

// ============================================================
// 町名抽出 & グループ化
// ============================================================
function extractTown(addr) {
  const body = addr.replace(new RegExp('^(?:' + PREF_STR + ')'), '');
  const nameOnly = body.replace(/[0-9０-９].*$/, '').trim();
  let m;
  m = nameOnly.match(/^(.+?市.+?区)(.*)$/);  if (m) return m[1] + (m[2] || '');
  m = nameOnly.match(/^(.+?市)(.*)$/);
  if (m) { const ku = m[2].match(/^(.+?[区町村])/); return m[1] + (ku ? ku[1] : m[2]); }
  m = nameOnly.match(/^(.+?区)(.*)$/);        if (m) return m[1] + (m[2] || '');
  return nameOnly.slice(0, 15);
}

function chomeKey(addr) {
  const normalized = addr.replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));
  const m = normalized.match(/(\d+)丁目/);
  if (m) return parseInt(m[1], 10);
  const n = normalized.match(/(\d+)/);
  return n ? parseInt(n[1], 10) : 9999;
}

function groupByTown(addresses) {
  const groups = {};
  for (const addr of addresses) {
    const town = extractTown(addr);
    if (!groups[town]) groups[town] = [];
    groups[town].push(addr);
  }
  for (const town in groups) {
    groups[town].sort((a, b) => chomeKey(a) - chomeKey(b));
  }
  return Object.fromEntries(
    Object.entries(groups).sort((a, b) => b[1].length - a[1].length)
  );
}

// ============================================================
// ⚠️ NEW: マップ送信用にマンション名・部屋番号をカットする関数
// ============================================================
function cleanForMap(addr) {
  // 番地（数字やハイフン）のあとに続く、漢字やアルファベット（メゾン○○など）以降をバッサリ削除
  // (例) "...駅南1-2-3メゾン姪浜201号" -> "...駅南1-2-3"
  return addr.replace(/([0-9０-９][0-9０-９\-－ー丁目番地号]*)[^0-9０-９\-－ー丁目番地号]+.*$/, '$1');
}

// ============================================================
// ナビアプリ URL 生成（現在地スタート対応）
// ============================================================
function googleMapsUrl(addrs) {
  const targets = addrs.slice(0, 10); // 最大10件
  // 最後の1件を目的地に設定（クリーンアップ済み）
  const dest = enc(cleanForMap(targets[targets.length - 1]));
  
  if (targets.length === 1) {
    // 1件なら現在地からそこへのルート
    return `https://www.google.com/maps/dir/?api=1&destination=${dest}`;
  }
  
  // 2件以上なら、最後の1件以外を「経由地(waypoints)」に設定
  // 出発地(origin)は指定しないことで、スマホの「現在地」が自動で使われる！
  const wp = targets.slice(0, -1).map(a => enc(cleanForMap(a))).join('%7C');
  return `https://www.google.com/maps/dir/?api=1&destination=${dest}&waypoints=${wp}`;
}

function yahooNaviUrl(addrs) {
  const last = cleanForMap(addrs[addrs.length - 1]);
  return `https://map.yahoo.co.jp/route/car?to=${enc(last)}&via=${addrs.slice(0,-1).map(a => enc(cleanForMap(a))).join('&via=')}`;
}

function appleMapsUrl(addrs) {
  const last = cleanForMap(addrs[addrs.length - 1]);
  return `https://maps.apple.com/?daddr=${enc(last)}`;
}

function enc(s) { return encodeURIComponent(s); }

// ============================================================
// 描画
// ============================================================
function renderResults(grouped) {
  const towns = Object.keys(grouped);
  const total = Object.values(grouped).reduce((s, a) => s + a.length, 0);

  let html = `
    <div class="result-header">
      <h2>町名グループ一覧</h2>
      <span class="badge">${total}件 / ${towns.length}グループ</span>
    </div>
    <button id="open-all-btn" onclick="openAllMaps()">📍 全グループをGoogle Mapsで開く</button>
  `;

  for (const [town, addrs] of Object.entries(grouped)) {
    const gUrl = googleMapsUrl(addrs);
    const yUrl = yahooNaviUrl(addrs);
    const aUrl = appleMapsUrl(addrs);
    html += `
      <div class="town-card">
        <div class="town-card-header" onclick="toggleCard(this)">
          <div class="town-name">📍 ${esc(town)}<span class="town-count">${addrs.length}件</span></div>
          <div class="card-actions">
            <a class="btn-app btn-google" href="${gUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation()">G Maps</a>
            <a class="btn-app btn-yahoo"  href="${yUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Yahoo!</a>
            <a class="btn-app btn-apple"  href="${aUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Apple</a>
            <span class="chevron">▼</span>
          </div>
        </div>
        <div class="addr-list">
          ${addrs.map((a, idx) => `
            <div class="addr-item">
              <span class="addr-text">${idx + 1}. ${esc(a)}</span>
              <div class="addr-btns">
                <a class="btn-single bs-google" href="https://www.google.com/maps/search/?api=1&query=${enc(cleanForMap(a))}" target="_blank" rel="noopener">G</a>
                <a class="btn-single bs-yahoo"  href="https://map.yahoo.co.jp/route/car?to=${enc(cleanForMap(a))}" target="_blank" rel="noopener">Y</a>
                <a class="btn-single bs-apple"  href="https://maps.apple.com/?daddr=${enc(cleanForMap(a))}" target="_blank" rel="noopener">A</a>
              </div>
            </div>
          `).join('')}
        </div>
      </div>`;
  }

  html += `
    <div class="footer-note">
      ⚠️ Google Mapsの経路案内は最大10件（現在地＋経由地9件＋目的地1件）まで。<br>
      11件以上ある場合は、最初の10件のみでルートを作成します。<br>
      Yahoo!カーナビ・Apple マップは目的地1件ずつの案内になります。
    </div>`;

  resultsEl.innerHTML = html;
  document.getElementById('open-all-btn').style.display = 'block';
  const first = resultsEl.querySelector('.town-card-header');
  if (first) toggleCard(first);
}

function toggleCard(header) {
  header.nextElementSibling.classList.toggle('open');
  header.querySelector('.chevron').classList.toggle('open');
}

function openAllMaps() {
  document.querySelectorAll('.btn-app.btn-google').forEach((link, i) => {
    setTimeout(() => window.open(link.href, '_blank'), i * 400);
  });
}

function esc(s) {
  return s.replace(/&/g,'&').replace(/</g,'<').replace(/>/g,'>').replace(/"/g,'"');
}
</script>
</body>
</html>
